name: Deploy API

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bebochka-api-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          command_timeout: 30m
          debug: true
          script_stop: true
          script: |
            set -eo pipefail

            DEPLOY_PATH="${{ secrets.PROD_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then DEPLOY_PATH="/opt/bebochka-backend"; fi

            BACKEND_PUBLISH_PORT="${{ secrets.PROD_BACKEND_PUBLISH_PORT }}"
            if [ -z "$BACKEND_PUBLISH_PORT" ]; then BACKEND_PUBLISH_PORT="55501"; fi

            REPO_SSH_URL="git@github.com:${{ github.repository }}.git"
            BRANCH="main"

            echo "==> Preflight: user=$(whoami) host=$(hostname) HOME=$HOME"
            echo "==> Preflight: git $(git --version 2>/dev/null || echo missing)"
            echo "==> Preflight: ssh $(ssh -V 2>&1 || echo missing)"

            echo "==> Deploy path: $DEPLOY_PATH"
            mkdir -p "$DEPLOY_PATH" || { echo "ERROR: mkdir failed (permissions on parent dir?)"; exit 1; }
            cd "$DEPLOY_PATH" || { echo "ERROR: cd failed"; exit 1; }
            echo "==> Working directory: $(pwd)"

            echo "==> SSH: trust github.com host key (fixes: Host key verification failed)"
            mkdir -p "$HOME/.ssh"
            chmod 700 "$HOME/.ssh"
            touch "$HOME/.ssh/known_hosts"
            chmod 600 "$HOME/.ssh/known_hosts"
            ssh-keygen -R github.com -f "$HOME/.ssh/known_hosts" 2>/dev/null || true
            if ! ssh-keyscan -t rsa,ecdsa,ed25519 github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null; then
              echo "ERROR: ssh-keyscan github.com failed (network? no ssh-keyscan?)"
              exit 1
            fi
            echo "==> SSH: probe GitHub (exit 1 with Hi!... is OK — means key works)"
            ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -T git@github.com 2>&1 || true

            echo "==> Git: init (if needed)"
            if [ ! -d .git ]; then
              git init || { echo "ERROR: git init failed"; exit 1; }
            fi

            echo "==> Git: remote origin"
            if git remote get-url origin >/dev/null 2>&1; then
              git remote set-url origin "$REPO_SSH_URL" || { echo "ERROR: git remote set-url failed"; exit 1; }
            else
              git remote add origin "$REPO_SSH_URL" || { echo "ERROR: git remote add failed"; exit 1; }
            fi

            echo "==> Git: fetch origin $BRANCH (server user needs SSH access to GitHub)"
            if ! git fetch --prune origin "refs/heads/$BRANCH:refs/remotes/origin/$BRANCH"; then
              echo "ERROR: git fetch failed. On the server run: ssh -T git@github.com"
              exit 1
            fi

            echo "==> Git: checkout $BRANCH"
            if ! git checkout -f -B "$BRANCH" "origin/$BRANCH"; then
              echo "ERROR: git checkout failed"
              exit 1
            fi

            echo "==> Write .env"
            umask 077
            cat > .env <<ENVEOF
            ASPNETCORE_ENVIRONMENT=Production
            BACKEND_PUBLISH_PORT=${BACKEND_PUBLISH_PORT}
            ConnectionStrings__DefaultConnection=${{ secrets.APP_CONNECTION_STRING }}
            Jwt__Key=${{ secrets.JWT_KEY }}
            Jwt__Issuer=BebochkaApi
            Jwt__Audience=BebochkaClient
            App__FrontendPublicUrl=https://bebochka.ru
            Vk__AppId=${{ secrets.VK_APP_ID }}
            Vk__SecureKey=${{ secrets.VK_SECURE_KEY }}
            Vk__RedirectUri=https://bebochka.ru/api/auth/vk/callback
            ENVEOF

            echo "==> Docker"
            if ! command -v docker >/dev/null 2>&1; then
              echo "ERROR: docker not found in PATH"
              exit 1
            fi

            run_compose() {
              if docker compose version >/dev/null 2>&1; then
                docker compose "$@"
              elif command -v docker-compose >/dev/null 2>&1; then
                docker-compose "$@"
              else
                echo "ERROR: neither 'docker compose' nor 'docker-compose' is available"
                exit 1
              fi
            }

            if ! run_compose -f docker-compose.yml --env-file .env up -d --build --remove-orphans; then
              echo "ERROR: docker compose up failed (permissions? add user to group docker, or use sudo)"
              exit 1
            fi
            docker image prune -f || true
            echo "==> Done"
