name: .NET API Deployment Pipeline

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERFILE_PATH: Dockerfile
  CONTAINER_PORT: 44315
  HOST_PORT: 55501
  DEPLOY_DIR: /opt/bebochka-backend
  IMAGE_NAME: bebochka-backend

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          set -e
          missing=0
          [ -z "${{ secrets.PROD_HOST }}" ] && echo "Missing PROD_HOST" && missing=1 || true
          [ -z "${{ secrets.PROD_USER }}" ] && echo "Missing PROD_USER" && missing=1 || true
          [ -z "${{ secrets.PROD_SSH_PRIVATE_KEY }}" ] && echo "Missing PROD_SSH_PRIVATE_KEY" && missing=1 || true
          [ -z "${{ secrets.PROD_SSH_PORT }}" ] && echo "Missing PROD_SSH_PORT" && missing=1 || true
          if [ -z "${{ secrets.DB_CONNECTION_STRING }}" ] && [ -z "${{ secrets.APP_CONNECTION_STRING }}" ]; then
            echo "Missing DB_CONNECTION_STRING and APP_CONNECTION_STRING (need one; prefer DB_CONNECTION_STRING)"
            missing=1
          fi
          [ -z "${{ secrets.JWT_KEY }}" ] && echo "Missing JWT_KEY" && missing=1 || true
          [ "$missing" -ne 0 ] && exit 1
          echo "Secrets OK"

      - name: Test SSH and host context
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          port: ${{ secrets.PROD_SSH_PORT }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          command_timeout: 2m
          script: |
            echo "=== SSH preflight ==="
            echo "Docker: $(docker --version 2>/dev/null || echo not installed)"
            echo "Disk: $(df -h / | tail -1)"
            docker ps -a --format 'table {{.Names}}\t{{.Status}}' | head -20
            echo "=== Preflight OK ==="

  build:
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      docker_tag: ${{ steps.meta.outputs.TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore / build / test (host)
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore
          if [ -n "$(find . -name '*.Tests.csproj' -type f | head -1)" ]; then
            dotnet test --configuration Release --no-build --verbosity normal
          else
            echo "No *Tests.csproj found, skipping tests"
          fi

      - name: Docker image tag
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="$(date -u +'%Y.%m.%d-%H%M')-${GITHUB_SHA::8}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local load + GHA layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.TAG }}
            ${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image tarball
        run: docker save ${{ env.IMAGE_NAME }}:latest | gzip > ${{ env.IMAGE_NAME }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ${{ env.IMAGE_NAME }}.tar.gz
          retention-days: 1

      - name: Job summary
        run: |
          {
            echo "## API build"
            echo "- Tag: **${{ steps.meta.outputs.TAG }}**"
            echo "- Commit: \`${GITHUB_SHA::8}\`"
            echo "- Image archive: \`${{ env.IMAGE_NAME }}.tar.gz\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .

      - name: Verify image archive
        run: ls -lh ${{ env.IMAGE_NAME }}.tar.gz && test -f ${{ env.IMAGE_NAME }}.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          source: "${{ env.IMAGE_NAME }}.tar.gz"
          target: "/tmp"
          overwrite: true

      - name: Prepare server, write .env, run container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            IMAGE_NAME="${{ env.IMAGE_NAME }}"
            DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
            HOST_PORT="${{ env.HOST_PORT }}"
            CONTAINER_PORT="${{ env.CONTAINER_PORT }}"
            CONN='${{ secrets.DB_CONNECTION_STRING }}'
            if [ -z "$CONN" ]; then CONN='${{ secrets.APP_CONNECTION_STRING }}'; fi
            if echo "$CONN" | grep -qiE '(^|;)(server|Server)=mysql(;|$)'; then
              echo "WARN: Server=mysql из контейнера docker run часто недоступен — используйте host.docker.internal или IP БД."
            fi
            echo "=== Prepare directories ==="
            mkdir -p "$DEPLOY_DIR/uploads" "$DEPLOY_DIR/logs" "$DEPLOY_DIR/wwwroot/uploads"
            chmod 777 "$DEPLOY_DIR/uploads" 2>/dev/null || true
            echo "=== Write .env ==="
            umask 077
            cat > "$DEPLOY_DIR/.env" <<EOF
            ConnectionStrings__DefaultConnection=$CONN
            Jwt__Key=${{ secrets.JWT_KEY }}
            Jwt__Issuer=BebochkaApi
            Jwt__Audience=BebochkaClient
            App__FrontendPublicUrl=https://bebochka.ru
            Vk__AppId=${{ secrets.VK_APP_ID }}
            Vk__SecureKey=${{ secrets.VK_SECURE_KEY }}
            Vk__RedirectUri=https://bebochka.ru/api/auth/vk/callback
            TelegramBot__Token=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TelegramBot__ChannelId=${{ secrets.TELEGRAM_BOT_CHANNEL_ID }}
            EOF
            chmod 600 "$DEPLOY_DIR/.env"
            test -f "$DEPLOY_DIR/.env" && echo "OK .env"
            echo "=== Load image and run ==="
            docker load < /tmp/$IMAGE_NAME.tar.gz
            rm -f /tmp/$IMAGE_NAME.tar.gz
            docker stop $IMAGE_NAME 2>/dev/null || true
            docker rm -f $IMAGE_NAME 2>/dev/null || true
            mkdir -p "$DEPLOY_DIR/wwwroot/uploads"
            chmod -R 777 "$DEPLOY_DIR/wwwroot/uploads" 2>/dev/null || true
            docker run -d \
              --name $IMAGE_NAME \
              --restart unless-stopped \
              --add-host=host.docker.internal:host-gateway \
              -p ${HOST_PORT}:${CONTAINER_PORT} \
              -v $DEPLOY_DIR/wwwroot/uploads:/app/wwwroot/uploads \
              -e ASPNETCORE_ENVIRONMENT=Production \
              -e ConnectionStrings__DefaultConnection="$CONN" \
              -e Jwt__Key='${{ secrets.JWT_KEY }}' \
              -e Jwt__Issuer=BebochkaApi \
              -e Jwt__Audience=BebochkaClient \
              -e App__FrontendPublicUrl=https://bebochka.ru \
              -e Vk__AppId='${{ secrets.VK_APP_ID }}' \
              -e Vk__SecureKey='${{ secrets.VK_SECURE_KEY }}' \
              -e Vk__RedirectUri=https://bebochka.ru/api/auth/vk/callback \
              -e TelegramBot__Token='${{ secrets.TELEGRAM_BOT_TOKEN }}' \
              -e TelegramBot__ChannelId='${{ secrets.TELEGRAM_BOT_CHANNEL_ID }}' \
              $IMAGE_NAME:latest
            sleep 4
            docker ps --filter "name=$IMAGE_NAME"
            docker logs --tail=30 $IMAGE_NAME
            docker image prune -f
            echo "=== Deploy finished ==="

  post-deploy-test:
    needs: [deploy, preflight]
    runs-on: ubuntu-latest
    steps:
      - name: Verify deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          command_timeout: 5m
          script: |
            echo "=== Post-deploy verification ==="
            docker ps -a | grep ${{ env.IMAGE_NAME }} || true
            docker logs --tail 40 ${{ env.IMAGE_NAME }} || true
            sleep 3
            CODE=$(curl -sS -o /tmp/api_body.txt -w "%{http_code}" --max-time 45 -X GET "http://127.0.0.1:${{ env.HOST_PORT }}/api/products" || echo "000")
            echo "GET /api/products HTTP $CODE"
            if [ "$CODE" = "200" ]; then head -c 200 /tmp/api_body.txt && echo " ... (truncated)"; else echo "WARN: ожидался 200 — проверьте БД и DB_CONNECTION_STRING"; fi
            echo "=== Done ==="

      - name: Summary
        run: |
          echo "## Post-deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Проверка на сервере: см. лог шага **Verify deployment** (HTTP-код /api/products)." >> "$GITHUB_STEP_SUMMARY"
